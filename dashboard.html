<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --surface3: #242840;
    --border: #2a2f45;
    --accent: #e8c96d;
    --accent2: #5b8cff;
    --green: #4ade80;
    --red: #f87171;
    --text: #f0f2f8;
    --text2: #adb6cc;
    --text3: #7a84a0;
    --radius: 10px;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    height: 52px;
  }
  .nav-brand {
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-right: 32px;
  }
  .nav-tab {
    padding: 0 18px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 7px;
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    letter-spacing: .3px;
    user-select: none;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-tab .tab-icon { font-size: 15px; }

  /* PAGES */
  .page { display: none; padding: 28px 28px; max-width: 1400px; margin: 0 auto; }
  .page.active { display: block; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 16px;
  }

  /* PAGE 1 - REGISTER SESSION */
  .session-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .session-header h2 {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--text);
  }
  .date-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }
  .date-input-wrap label { color: var(--text2); font-size: 12px; }
  input[type="date"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 11px;
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  input[type="date"]:focus { border-color: var(--accent); }

  .columns-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .col-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .col-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .col-badge.win { background: rgba(74,222,128,.15); color: var(--green); }
  .col-badge.lose { background: rgba(248,113,113,.15); color: var(--red); }

  .player-row {
    display: grid;
    grid-template-columns: 1fr 100px 28px;
    gap: 6px;
    align-items: center;
    margin-bottom: 7px;
  }
  .player-row input[type="text"],
  .player-row input[type="number"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px;
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    width: 100%;
    transition: border-color .15s;
  }
  .player-row input:focus { border-color: var(--accent2); }
  .player-row input::placeholder { color: var(--text2); }
  .remove-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text3);
    cursor: pointer;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all .15s;
  }
  .remove-btn:hover { border-color: var(--red); color: var(--red); }
  .add-row-btn {
    margin-top: 4px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--text3);
    cursor: pointer;
    padding: 6px 12px;
    font-size: 12px;
    transition: all .15s;
    width: 100%;
    font-family: var(--font-body);
  }
  .add-row-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* BUYIN SECTION */
  .buyin-section {
    margin-top: 24px;
  }
  .buyin-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    color: var(--text2);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .buyin-toggle .chevron { transition: transform .2s; font-size: 11px; }
  .buyin-toggle.open .chevron { transform: rotate(90deg); }

  .buyin-grid {
    display: none;
  }
  .buyin-grid.open { display: block; }

  .buyin-inner {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 7px;
    margin-bottom: 10px;
  }
  .buyin-field {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .buyin-label {
    padding: 6px 8px;
    font-size: 11px;
    color: var(--text3);
    font-family: var(--font-mono);
    border-right: 1px solid var(--border);
    white-space: nowrap;
  }
  .buyin-field input {
    background: none;
    border: none;
    color: var(--text);
    padding: 6px 8px;
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    width: 100%;
  }
  .buyin-summary {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    padding: 12px 16px;
    background: var(--surface2);
    border-radius: 6px;
    border: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .buyin-summary span { color: var(--text2); }
  .buyin-summary strong { color: var(--text); }
  .buyin-summary .diff.pos { color: var(--green); }
  .buyin-summary .diff.neg { color: var(--red); }

  .save-btn {
    margin-top: 24px;
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 8px;
    padding: 12px 36px;
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity .2s;
    display: block;
  }
  .save-btn:hover { opacity: .85; }

  .sessions-list {
    margin-top: 28px;
  }
  .session-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 18px;
  }
  .session-date {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text2);
    min-width: 80px;
    padding-top: 2px;
  }
  .session-players { flex: 1; display: flex; flex-wrap: wrap; gap: 6px; }
  .player-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-family: var(--font-mono);
  }
  .player-chip.win { background: rgba(74,222,128,.12); color: var(--green); }
  .player-chip.lose { background: rgba(248,113,113,.12); color: var(--red); }
  .delete-session {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 14px;
    padding: 0;
    transition: color .15s;
  }
  .delete-session:hover { color: var(--red); }

  /* PAGE 2 - PLAYER STATS */
  .stats-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stats-header h2 {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 2px;
  }
  .player-search {
    position: relative;
    flex: 1;
    max-width: 320px;
  }
  .player-search input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 14px 9px 36px;
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
  }
  .player-search input:focus { border-color: var(--accent2); }
  .player-search .search-icon {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
  }
  .search-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    z-index: 50;
    max-height: 200px;
    overflow-y: auto;
    display: none;
  }
  .search-dropdown.open { display: block; }
  .search-option {
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
    transition: background .1s;
  }
  .search-option:hover, .search-option.focused { background: var(--surface3); }

  .period-filter {
    display: flex;
    gap: 4px;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .period-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    font-family: var(--font-body);
  }
  .period-btn:hover { color: var(--text); border-color: var(--text3); }
  .period-btn.active { background: var(--accent); color: #0d0f14; border-color: var(--accent); font-weight: 600; }

  .stats-summary {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
  }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--font-mono);
    font-size: 24px;
    font-weight: 500;
  }
  .stat-value.pos { color: var(--green); }
  .stat-value.neg { color: var(--red); }
  .stat-value.neutral { color: var(--text); }

  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    height: 240px;
    position: relative;
  }

  .results-table {
    width: 100%;
    border-collapse: collapse;
  }
  .results-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
  }
  .results-table td {
    padding: 9px 12px;
    font-size: 13px;
    border-bottom: 1px solid rgba(42,47,69,.5);
    font-family: var(--font-mono);
  }
  .results-table tr:last-child td { border-bottom: none; }
  .results-table .pos { color: var(--green); }
  .results-table .neg { color: var(--red); }
  .results-table tr:hover td { background: var(--surface2); }

  .monthly-breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .monthly-breakdown summary {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 20px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    list-style: none;
    user-select: none;
    outline: none;
  }
  .monthly-breakdown summary::-webkit-details-marker { display: none; }
  .monthly-breakdown summary::after {
    content: '▸';
    margin-left: auto;
    font-size: 12px;
    transition: transform .2s;
  }
  .monthly-breakdown[open] summary::after { transform: rotate(90deg); }
  .monthly-breakdown summary:hover { color: var(--text2); }
  .monthly-breakdown table { width: 100%; border-collapse: collapse; }
  .monthly-breakdown th {
    text-align: left;
    padding: 7px 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text3);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .monthly-breakdown td {
    padding: 8px 20px;
    font-size: 13px;
    border-bottom: 1px solid rgba(42,47,69,.5);
    font-family: var(--font-mono);
  }
  .monthly-breakdown tr:last-child td { border-bottom: none; }
  .monthly-breakdown tr:hover td { background: var(--surface2); }
  .monthly-breakdown .pos { color: var(--green); }
  .monthly-breakdown .neg { color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* PAGE 3 - LEADERBOARD */
  .lb-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .lb-header h2 {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 2px;
  }
  .lb-fun-stats {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .lb-stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .lb-stat-box:hover { border-color: var(--accent); }
  .lb-stat-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
    min-height: 28px;
    display: flex;
    align-items: flex-end;
  }
  .lb-stat-player {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lb-stat-value {
    font-family: var(--font-mono);
    font-size: 15px;
  }
  .lb-stat-value.pos { color: var(--green); }
  .lb-stat-value.neg { color: var(--red); }
  .lb-stat-value.accent { color: var(--accent); }
  .lb-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .lb-list { }
  .lb-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 7px;
    transition: border-color .15s;
  }
  .lb-item { cursor: pointer; }
  .lb-item:hover { border-color: var(--accent); }
  .lb-rank {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    min-width: 24px;
    text-align: right;
  }
  .lb-rank.gold { color: #e8c96d; }
  .lb-rank.silver { color: #c0c0c0; }
  .lb-rank.bronze { color: #cd7f32; }
  .lb-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
  }
  .lb-sessions {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--font-mono);
    margin-right: 8px;
  }
  .lb-amount {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 500;
    min-width: 80px;
    text-align: right;
  }
  .lb-amount.pos { color: var(--green); }
  .lb-amount.neg { color: var(--red); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text);
    transition: transform .3s;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 700px) {
    .columns-wrap { grid-template-columns: 1fr; }
    .lb-grid { grid-template-columns: 1fr; }
    .stats-summary { grid-template-columns: 1fr 1fr; }
    .period-filter { margin-left: 0; }
    .acc-columns { grid-template-columns: 1fr; }
  }

  /* PAGE 4 - SESSIONS ACCORDION */
  .sessions-page-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .sessions-page-header h2 {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 2px;
  }
  .acc-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .acc-header {
    display: flex;
    align-items: center;
    padding: 13px 18px;
    cursor: pointer;
    user-select: none;
    gap: 12px;
    transition: background .15s;
  }
  .acc-header:hover { background: var(--surface2); }
  .acc-chevron {
    font-size: 10px;
    color: var(--text3);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .acc-item.open .acc-chevron { transform: rotate(90deg); }
  .acc-date {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text2);
    min-width: 110px;
    flex-shrink: 0;
  }
  .acc-chips {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    flex: 1;
  }
  .acc-body {
    display: none;
    padding: 14px 18px 18px;
    border-top: 1px solid var(--border);
  }
  .acc-item.open .acc-body { display: block; }
  .acc-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .acc-col-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .acc-col-title.win { color: var(--green); }
  .acc-col-title.lose { color: var(--red); }
  .acc-player-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(42,47,69,.5);
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .acc-player-row:last-child { border-bottom: none; }
  .acc-player-amount.pos { color: var(--green); }
  .acc-player-amount.neg { color: var(--red); }
  .acc-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .acc-edit-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(42,47,69,.5);
  }
  .acc-edit-row:last-child { border-bottom: none; }
  .acc-edit-row .acc-player-nick { flex: 1; }
  .acc-edit-input {
    width: 80px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    padding: 4px 8px;
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
  }
  .acc-edit-input:focus { border-color: var(--accent2); }
  .acc-swap-btn {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text2);
    cursor: pointer;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all .15s;

  }
  .acc-swap-btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm {

  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--text2); }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">STATS</div>
  <div class="nav-tab active" onclick="switchTab(0)" id="tab0">
    <span class="tab-icon">📋</span> Legg inn
  </div>
  <div class="nav-tab" onclick="switchTab(1)" id="tab1">

  </div>
  <div class="nav-tab" onclick="switchTab(2)" id="tab2">

  </div>
  <div class="nav-tab" onclick="switchTab(3)" id="tab3">

  </div>
</nav>

<!-- PAGE 1: LEGG INN -->
<div class="page active" id="page0">
  <div class="session-header">
    <h2>NY SESSION</h2>
    <div class="date-input-wrap">
      <label>Dato</label>
      <input type="date" id="sessionDate">
    </div>
  </div>

  <div class="columns-wrap">
    <!-- VINNERE -->
    <div class="card">
      <div class="col-header">
        <div class="col-badge win">VINNERE</div>
      </div>
      <div class="player-row" style="grid-template-columns:1fr 100px 28px;">
        <span style="font-size:11px;color:var(--text2);letter-spacing:.5px;">NICK</span>
        <span style="font-size:11px;color:var(--text2);letter-spacing:.5px;">BELØP</span>
        <span></span>
      </div>
      <div id="winners-rows"></div>
      <button class="add-row-btn" onclick="addRow('winners')">+ Legg til spiller</button>
    </div>

    <!-- TAPERE -->
    <div class="card">
      <div class="col-header">
        <div class="col-badge lose">TAPERE</div>
      </div>
      <div class="player-row" style="grid-template-columns:1fr 100px 28px;">
        <span style="font-size:11px;color:var(--text2);letter-spacing:.5px;">NICK</span>
        <span style="font-size:11px;color:var(--text2);letter-spacing:.5px;">BELØP</span>
        <span></span>
      </div>
      <div id="losers-rows"></div>
      <button class="add-row-btn" onclick="addRow('losers')">+ Legg til spiller</button>
    </div>

  <!-- BUYIN -->
  <div class="buyin-section">
    <div class="buyin-toggle" id="buyinToggle" onclick="toggleBuyin()">
      <span class="chevron">▶</span>
      <span>Manuell utregning (innkjøp / utveksling)</span>
    </div>
    <div class="buyin-grid" id="buyinGrid">
      <div class="buyin-inner" id="buyinFields"></div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;">
        <span style="font-size:12px;color:var(--text2);">Utveksling:</span>
        <div class="buyin-field" style="width:130px;">
          <input type="number" id="exchangeRate" style="padding-left:10px;" placeholder="0" step="any" oninput="updateBuyinSummary()">
        </div>

        <button class="add-row-btn" style="width:auto;padding:6px 14px;border-color:var(--red);color:var(--red);" onclick="resetBuyin()">Nullstill</button>
      </div>
      <div class="buyin-summary">
        <div><span>Total innkjøp: </span><strong id="totalBuyin">—</strong></div>
        <div><span>Utveksling: </span><strong id="totalAfter">—</strong></div>
        <div><span>Resultat: </span><strong class="diff" id="buyinDiff">—</strong></div>
      </div>

  </div>

  <button class="save-btn" onclick="saveSession()">LAGRE SESSION</button>
</div>

<!-- PAGE 2: SPILLER -->
<div class="page" id="page1">
  <div class="stats-header">
    <h2>SPILLER</h2>
    <div class="player-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="playerSearch" placeholder="Søk på nick..." oninput="onPlayerSearch()" onfocus="showSearchDrop()" onblur="hideSearchDrop()" onkeydown="searchKeyNav(event)">
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
    <select id="playerDropdown" onchange="selectPlayer(this.value)" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px;font-family:var(--font-body);font-size:13px;outline:none;cursor:pointer;min-width:140px;">
      <option value="">Velg spiller…</option>
    </select>
    <div class="period-filter" id="statsFilter">
      <button class="period-btn active" onclick="setPeriod('all', this)">Alt</button>
      <button class="period-btn" onclick="setPeriod('2024', this)">2024</button>
      <button class="period-btn" onclick="setPeriod('2025', this)">2025</button>

<!-- PAGE 3: TOPPLISTE -->
<div class="page" id="page2">
  <div class="lb-header">
    <h2>TOPPLISTE</h2>
    <div class="period-filter" id="lbFilter">
      <button class="period-btn active" onclick="setLbPeriod('all', this)">Alt</button>
      <button class="period-btn" onclick="setLbPeriod('2024', this)">2024</button>
      <button class="period-btn" onclick="setLbPeriod('2025', this)">2025</button>
      <button class="period-btn" onclick="setLbPeriod('2026', this)">2026</button>
      <button class="period-btn" onclick="setLbPeriod('thisMonth', this)">Denne mnd</button>
      <button class="period-btn" onclick="setLbPeriod('lastMonth', this)">Forrige mnd</button>
    </div>
  </div>
  <div class="lb-fun-stats" id="lbFunStats"></div>
  <div class="lb-grid">
    <div>
      <div class="card-title" style="color:var(--green)">▲ TOPP VINNERE</div>
      <div id="lbWinners"></div>
    </div>
    <div>
      <div class="card-title" style="color:var(--red)">▼ TOPP TAPERE</div>

</div>

<!-- PAGE 4: SESSIONS -->
<div class="page" id="page3">
  <div class="sessions-page-header">
    <h2>SESSIONS</h2>
    <div class="period-filter" id="sessionsFilter">
      <button class="period-btn active" onclick="setSessionsPeriod('all', this)">Alt</button>
      <button class="period-btn" onclick="setSessionsPeriod('2024', this)">2024</button>
      <button class="period-btn" onclick="setSessionsPeriod('2025', this)">2025</button>
      <button class="period-btn" onclick="setSessionsPeriod('2026', this)">2026</button>
      <button class="period-btn" onclick="setSessionsPeriod('thisMonth', this)">Denne mnd</button>
      <button class="period-btn" onclick="setSessionsPeriod('lastMonth', this)">Forrige mnd</button>
    </div>
  </div>
  <div id="sessionsAccordion"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA STORE
// ============================================================
let db = {
  sessions: [],   // [{id, date, winners:[{nick,amount}], losers:[{nick,amount}]}]
};

async function loadDB() {
  try {
    const res = await fetch('/api/sessions');
    db.sessions = await res.json();
  } catch(e) {
    db.sessions = [];
  }
}

// ============================================================
// NAV
// ============================================================
function switchTab(i) {
  document.querySelectorAll('.page').forEach((p,j) => p.classList.toggle('active', i===j));
  document.querySelectorAll('.nav-tab').forEach((t,j) => t.classList.toggle('active', i===j));
  if(i===1) { updateDatalist(); renderPlayerView(); }
  if(i===2) renderLeaderboard();
  if(i===3) renderSessionsPage();
}

// ============================================================
// PAGE 1 - ROWS
// ============================================================
let winnerCount = 0;
let loserCount = 0;
let buyinCount = 0;

function addRow(type, nick='', amount='') {
  const container = document.getElementById(type + '-rows');
  const id = type + '-' + Date.now() + Math.random();
  const div = document.createElement('div');
  div.className = 'player-row';
  div.id = id;
  div.innerHTML = `
    <input type="text" placeholder="Nick" value="${nick}" list="playerList" autocomplete="off" onkeydown="tabComplete(event, this)">
    <input type="number" placeholder="0" value="${amount}" step="any">
    <button class="remove-btn" onclick="removeRow('${id}')">×</button>
  `;
  container.appendChild(div);
  updateDatalist();
}

function removeRow(id) {
  const el = document.getElementById(id);
  if(el) el.remove();
}

function initRows() {
  const wc = document.getElementById('winners-rows');
  const lc = document.getElementById('losers-rows');
  wc.innerHTML = ''; lc.innerHTML = '';
  for(let i=0;i<15;i++) addRow('winners');
  for(let i=0;i<15;i++) addRow('losers');
}

function updateDatalist() {
  let dl = document.getElementById('playerList');
  if(!dl) { dl = document.createElement('datalist'); dl.id='playerList'; document.body.appendChild(dl); }
  const players = getAllPlayers();
  dl.innerHTML = players.map(p=>`<option value="${p}">`).join('');
  const dd = document.getElementById('playerDropdown');
  if(dd) {
    const current = dd.value;
    dd.innerHTML = '<option value="">Velg spiller…</option>' + players.map(p=>`<option value="${p}"${p===current?' selected':''}>${p}</option>`).join('');
  }
}

function getAllPlayers() {
  const set = new Set();
  db.sessions.forEach(s => {
    s.winners.forEach(w => set.add(w.nick));
    s.losers.forEach(l => set.add(l.nick));
  });
  return [...set].sort();
}

// BUYIN
function initBuyinFields() {
  const c = document.getElementById('buyinFields');
  c.innerHTML = '';
  buyinCount = 0;
  for(let i=0;i<20;i++) addBuyinField();
}
function addBuyinField() {
  const c = document.getElementById('buyinFields');
  buyinCount++;
  const d = document.createElement('div');
  d.className = 'buyin-field';
  d.innerHTML = `<span class="buyin-label">#${buyinCount}</span><input type="number" placeholder="0" oninput="updateBuyinSummary()" step="any">`;
  c.appendChild(d);
}
function resetBuyin() {
  initBuyinFields();
  document.getElementById('exchangeRate').value = '';
  updateBuyinSummary();
}
function updateBuyinSummary() {
  const inputs = document.querySelectorAll('#buyinFields input');
  let total = 0;
  inputs.forEach(i => { const v = parseFloat(i.value)||0; total += v; });
  const utveksling = parseFloat(document.getElementById('exchangeRate').value)||0;
  const diff = utveksling - total;
  document.getElementById('totalBuyin').textContent = fmt(total);
  document.getElementById('totalAfter').textContent = fmt(utveksling);
  const diffEl = document.getElementById('buyinDiff');
  diffEl.textContent = fmt(diff);
  diffEl.className = 'diff ' + (diff > 0 ? 'pos' : diff < 0 ? 'neg' : '');
}
function toggleBuyin() {
  const toggle = document.getElementById('buyinToggle');
  const grid = document.getElementById('buyinGrid');
  toggle.classList.toggle('open');
  grid.classList.toggle('open');
}

// ============================================================
// SAVE SESSION
// ============================================================
async function saveSession() {
  const date = document.getElementById('sessionDate').value;
  if(!date) { showToast('Velg en dato', 'error'); return; }

  const winners = getRowData('winners');
  const losers = getRowData('losers');
  if(winners.length === 0 && losers.length === 0) {
    showToast('Ingen spillere registrert', 'error'); return;
  }

  const session = {
    id: Date.now(),
    date,
    winners,
    losers
  };

  try {
    const res = await fetch('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(session)
    });
    if (!res.ok) throw new Error('Server error');
    db.sessions.push(session);
    db.sessions.sort((a,b)=>a.date.localeCompare(b.date));
    updateDatalist();
    showToast('Session lagret!', 'success');
    initRows();
    initBuyinFields();
    document.getElementById('exchangeRate').value = '';
    updateBuyinSummary();
    document.getElementById('sessionDate').value = '';
  } catch(e) {
    showToast('Feil ved lagring', 'error');
  }
}

function getRowData(type) {
  const rows = document.querySelectorAll('#' + type + '-rows .player-row');
  const result = [];
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const nick = inputs[0].value.trim();
    const amount = parseFloat(inputs[1].value);
    if(nick && !isNaN(amount) && amount !== 0) result.push({nick, amount});
  });
  return result;
}

function renderSessionsList() {
  const c = document.getElementById('sessionsList');
  if(db.sessions.length === 0) { c.innerHTML = '<div style="color:var(--text3);font-size:13px;">Ingen sessions ennå.</div>'; return; }
  const sorted = [...db.sessions].reverse();
  c.innerHTML = sorted.map(s => `
    <div class="session-item">
      <div class="session-date">${formatDate(s.date)}</div>
      <div class="session-players">
        ${s.winners.map(w=>`<span class="player-chip win">${w.nick} +${fmt(w.amount)}</span>`).join('')}
        ${s.losers.map(l=>`<span class="player-chip lose">${l.nick} -${fmt(l.amount)}</span>`).join('')}
      </div>
      <button class="delete-session" onclick="deleteSession(${s.id})" title="Slett">🗑</button>
    </div>
  `).join('');
}

async function deleteSession(id) {
  if(!confirm('Slett denne session?')) return;
  try {
    const res = await fetch('/api/sessions/' + id, { method: 'DELETE' });
    if (!res.ok) throw new Error('Server error');
    db.sessions = db.sessions.filter(s => s.id !== id);
    renderSessionsPage();
    showToast('Session slettet');
  } catch(e) {
    showToast('Feil ved sletting', 'error');
  }
}

async function deletePlayerResult(sessionId) {
  if(!confirm('Slett dette resultatet?')) return;
  const nick = selectedPlayer;
  const session = db.sessions.find(s => s.id === sessionId);
  if(!session) return;

  const updated = {
    ...session,
    winners: session.winners.filter(p => p.nick !== nick),
    losers: session.losers.filter(p => p.nick !== nick)
  };

  try {
    if(updated.winners.length === 0 && updated.losers.length === 0) {
      const res = await fetch('/api/sessions/' + sessionId, { method: 'DELETE' });
      if(!res.ok) throw new Error();
      db.sessions = db.sessions.filter(s => s.id !== sessionId);
    } else {
      const res = await fetch('/api/sessions/' + sessionId, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updated)
      });
      if(!res.ok) throw new Error();
      const idx = db.sessions.findIndex(s => s.id === sessionId);
      db.sessions[idx] = updated;
    }
    renderSessionsPage();
    renderPlayerView();
    showToast('Resultat slettet');
  } catch(e) {
    showToast('Feil ved sletting', 'error');
  }
}

// ============================================================
// PAGE 2 - PLAYER STATS
// ============================================================
let selectedPlayer = null;
let currentPeriod = 'all';
let playerChart = null;
let searchFocusIdx = -1;

function onPlayerSearch() {
  searchFocusIdx = -1;
  const q = document.getElementById('playerSearch').value.toLowerCase();
  const players = getAllPlayers().filter(p => p.toLowerCase().includes(q));
  const dd = document.getElementById('searchDropdown');
  if(players.length === 0 || q === '') { dd.classList.remove('open'); return; }
  dd.innerHTML = players.map(p=>`<div class="search-option" onmousedown="selectPlayer('${p.replace(/'/g,"\\'")}');">${p}</div>`).join('');
  dd.classList.add('open');
}
function showSearchDrop() { onPlayerSearch(); }
function hideSearchDrop() { setTimeout(() => document.getElementById('searchDropdown').classList.remove('open'), 150); }

function searchKeyNav(e) {
  const dd = document.getElementById('searchDropdown');
  const opts = dd.querySelectorAll('.search-option');
  if(!dd.classList.contains('open') || opts.length === 0) return;
  if(e.key === 'ArrowDown') {
    e.preventDefault();
    searchFocusIdx = Math.min(searchFocusIdx + 1, opts.length - 1);
  } else if(e.key === 'ArrowUp') {
    e.preventDefault();
    searchFocusIdx = Math.max(searchFocusIdx - 1, 0);
  } else if(e.key === 'Enter') {
    e.preventDefault();
    const target = searchFocusIdx >= 0 ? opts[searchFocusIdx] : opts[0];
    if(target) target.dispatchEvent(new MouseEvent('mousedown'));
    return;
  } else if(e.key === 'Escape') {
    dd.classList.remove('open'); return;
  } else { return; }
  opts.forEach((o, i) => o.classList.toggle('focused', i === searchFocusIdx));
}

function selectPlayer(nick) {
  selectedPlayer = nick;
  document.getElementById('playerSearch').value = nick;
  document.getElementById('searchDropdown').classList.remove('open');
  const dd = document.getElementById('playerDropdown');
  if(dd) dd.value = nick;
  renderPlayerView();
}

function setPeriod(period, btn) {
  currentPeriod = period;
  document.querySelectorAll('#statsFilter .period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPlayerView();
}

function filterByPeriod(sessions, period) {
  const now = new Date();
  return sessions.filter(s => {
    const d = new Date(s.date);
    if(period === 'all') return true;
    if(period === '2024') return d.getFullYear() === 2024;
    if(period === '2025') return d.getFullYear() === 2025;
    if(period === '2026') return d.getFullYear() === 2026;
    if(period === 'thisMonth') return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    if(period === 'lastMonth') {
      const lm = new Date(now.getFullYear(), now.getMonth()-1, 1);
      return d.getMonth()===lm.getMonth() && d.getFullYear()===lm.getFullYear();
    }
    return true;
  });
}

function getPlayerResults(nick, period) {
  const filtered = filterByPeriod(db.sessions, period);
  const results = [];
  filtered.forEach(s => {
    const w = s.winners.find(p=>p.nick===nick);
    const l = s.losers.find(p=>p.nick===nick);
    if(w) results.push({date:s.date, amount:w.amount, type:'win', sessionId:s.id});
    if(l) results.push({date:s.date, amount:-l.amount, type:'lose', sessionId:s.id});
  });
  return results.sort((a,b)=>b.date.localeCompare(a.date));
}

function renderPlayerView() {
  const c = document.getElementById('playerView');
  if(!selectedPlayer) {
    c.innerHTML = `<div class="empty-state"><div class="empty-icon">👤</div><p>Søk eller velg en spiller</p></div>`;
    return;
  }
  const results = getPlayerResults(selectedPlayer, currentPeriod);
  if(results.length === 0) {
    c.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>Ingen data for <strong>${selectedPlayer}</strong> i denne perioden</p></div>`;
    return;
  }
  const total = results.reduce((a,r)=>a+r.amount,0);
  const sessions = results.length;
  const wins = results.filter(r=>r.amount>0).length;
  const losses = results.filter(r=>r.amount<0).length;
  const best = Math.max(...results.map(r=>r.amount));
  const worst = Math.min(...results.map(r=>r.amount));

  // Streaks counted oldest→newest
  let maxWinStreak = 0, maxLoseStreak = 0, curWin = 0, curLose = 0;
  [...results].reverse().forEach(r => {
    if(r.amount > 0) { curWin++; curLose = 0; maxWinStreak = Math.max(maxWinStreak, curWin); }
    else             { curLose++; curWin = 0; maxLoseStreak = Math.max(maxLoseStreak, curLose); }
  });

  // Cumulative calculated oldest→newest, chart displayed that way too
  const chronological = [...results].reverse();
  let running = 0;
  const cumBySession = {};
  const chartLabels = [];
  const chartData = [];
  chronological.forEach(r => {
    running += r.amount;
    cumBySession[r.sessionId] = running;
    chartLabels.push(formatDate(r.date));
    chartData.push(running);
  });

  c.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;" id="playerNameBar">
      <span style="font-family:var(--font-display);font-size:28px;letter-spacing:2px;">${selectedPlayer}</span>
      <button class="btn-sm btn-edit" onclick="showRenameInput()">Endre navn</button>
    </div>
    <div class="stats-summary">
      <div class="stat-box">
        <div class="stat-label">Total</div>
        <div class="stat-value ${total>=0?'pos':'neg'}">${total>=0?'+':''}${fmt(total)}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Sessions</div>
        <div class="stat-value neutral">${sessions} <span style="font-size:13px;color:var(--text2);">(${wins}W-${losses}L)</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Snitt / session</div>
        <div class="stat-value ${total>=0?'pos':'neg'}">${total>=0?'+':''}${fmt(total/sessions)}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Lengste vinnerrekke</div>
        <div class="stat-value ${maxWinStreak>0?'pos':'neutral'}">${maxWinStreak}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Lengste taperekke</div>
        <div class="stat-value ${maxLoseStreak>0?'neg':'neutral'}">${maxLoseStreak}</div>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="playerChart"></canvas>
    </div>
    ${(()=>{
      const monthly = {};
      results.forEach(r => {
        const d = new Date(r.date);
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        const label = d.toLocaleDateString('nb-NO',{month:'long',year:'numeric'});
        if(!monthly[key]) monthly[key] = {label, sessions:0, pnl:0};
        monthly[key].sessions++;
        monthly[key].pnl += r.amount;
      });
      const rows = Object.keys(monthly).sort((a,b)=>b.localeCompare(a)).map(k=>{
        const m = monthly[k];
        return `<tr>
          <td style="text-transform:capitalize">${m.label}</td>
          <td>${m.sessions}</td>
          <td class="${m.pnl>=0?'pos':'neg'}">${m.pnl>=0?'+':''}${fmt(m.pnl)}</td>
        </tr>`;
      }).join('');
      return `<details class="monthly-breakdown">
        <summary>Månedlig oversikt</summary>
        <table>
          <thead><tr><th>Måned</th><th>Sessions</th><th>P&L</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </details>`;
    })()}
    <div class="card">
      <table class="results-table">
        <thead><tr><th>Dato</th><th>Resultat</th><th>Kumulativt</th><th></th></tr></thead>
        <tbody>
          ${results.map((r,i)=>{
            const cum = cumBySession[r.sessionId];
            return `<tr>
              <td>${formatDate(r.date)}</td>
              <td class="${r.amount>=0?'pos':'neg'}">${r.amount>=0?'+':''}${fmt(r.amount)}</td>
              <td class="${cum>=0?'pos':'neg'}">${cum>=0?'+':''}${fmt(cum)}</td>
              <td><button class="delete-session" onclick="deletePlayerResult(${r.sessionId})" title="Slett">🗑</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  // Draw chart
  if(playerChart) playerChart.destroy();
  const ctx = document.getElementById('playerChart').getContext('2d');
  const color = total >= 0 ? '#4ade80' : '#f87171';
  playerChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: chartLabels,
      datasets: [{
        data: chartData,
        borderColor: color,
        backgroundColor: color + '18',
        borderWidth: 2,
        pointRadius: 3,
        pointBackgroundColor: color,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#555e7a', font: { size: 10 } }, grid: { color: '#1c2030' } },
        y: { ticks: { color: '#555e7a', font: { size: 10 }, callback: v => fmt(v) }, grid: { color: '#1c2030' } }
      }
    }
  });
}

// ============================================================
// PAGE 3 - LEADERBOARD
// ============================================================
let lbPeriod = 'all';

function setLbPeriod(period, btn) {
  lbPeriod = period;
  document.querySelectorAll('#lbFilter .period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLeaderboard();
}

function renderLeaderboard() {
  const sessions = filterByPeriod(db.sessions, lbPeriod);
  const sorted = [...sessions].sort((a,b) => a.date.localeCompare(b.date));

  // Build per-player result arrays (oldest→newest)
  const playerResults = {};
  sorted.forEach(s => {
    s.winners.forEach(w => { (playerResults[w.nick] = playerResults[w.nick]||[]).push(w.amount); });
    s.losers.forEach(l  => { (playerResults[l.nick]  = playerResults[l.nick] ||[]).push(-l.amount); });
  });

  // Totals & session counts for main leaderboard
  const totals = {}, sessionCounts = {};
  Object.entries(playerResults).forEach(([nick, res]) => {
    totals[nick] = res.reduce((a,v)=>a+v, 0);
    sessionCounts[nick] = res.length;
  });

  const entries = Object.entries(totals).map(([nick,total])=>({nick,total,sessions:sessionCounts[nick]||0}));
  const winners = [...entries].filter(e=>e.total>0).sort((a,b)=>b.total-a.total).slice(0,20);
  const losers  = [...entries].filter(e=>e.total<=0).sort((a,b)=>a.total-b.total).slice(0,20);

  const rankClass = i => i===0?'gold':i===1?'silver':i===2?'bronze':'';
  const lbRow = (e, i, cls, sign) => `
    <div class="lb-item" onclick="goToPlayer('${e.nick.replace(/'/g,"\\'")}')">
      <div class="lb-rank ${rankClass(i)}">${i+1}</div>
      <div class="lb-name">${e.nick}</div>
      <div class="lb-sessions">${e.sessions}x</div>
      <div class="lb-amount ${cls}">${sign}${fmt(e.total)}</div>
    </div>`;

  document.getElementById('lbWinners').innerHTML = winners.length===0
    ? '<div style="color:var(--text3);font-size:13px;padding:12px 0;">Ingen data</div>'
    : winners.map((e,i) => lbRow(e, i, 'pos', '+')).join('');
  document.getElementById('lbLosers').innerHTML = losers.length===0
    ? '<div style="color:var(--text3);font-size:13px;padding:12px 0;">Ingen data</div>'
    : losers.map((e,i) => lbRow(e, i, 'neg', '')).join('');

  // Fun stats
  let winStreak   = {nick:'—', val:0};
  let loseStreak  = {nick:'—', val:0};
  let bestSingle  = {nick:'—', val:-Infinity};
  let worstSingle = {nick:'—', val:Infinity};
  let mostPlayed  = {nick:'—', val:0};
  let bestWinRate = {nick:'—', val:-1, sessions:0};
  let bestAvg     = {nick:'—', val:-Infinity};

  Object.entries(playerResults).forEach(([nick, res]) => {
    // Streaks
    let cw=0, cl=0, mw=0, ml=0;
    res.forEach(v => {
      if(v>0){cw++;cl=0;mw=Math.max(mw,cw);}else{cl++;cw=0;ml=Math.max(ml,cl);}
    });
    if(mw > winStreak.val)  winStreak  = {nick, val:mw};
    if(ml > loseStreak.val) loseStreak = {nick, val:ml};

    // Best/worst single session
    res.forEach(v => {
      if(v > bestSingle.val)  bestSingle  = {nick, val:v};
      if(v < worstSingle.val) worstSingle = {nick, val:v};
    });

    // Most sessions
    if(res.length > mostPlayed.val) mostPlayed = {nick, val:res.length};

    // Win rate (min 5 sessions)
    if(res.length >= 5) {
      const rate = res.filter(v=>v>0).length / res.length;
      if(rate > bestWinRate.val || (rate === bestWinRate.val && res.length > bestWinRate.sessions))
        bestWinRate = {nick, val:rate, sessions:res.length};
    }

    // Best avg per session (min 5 sessions)
    if(res.length >= 5) {
      const avg = res.reduce((a,v)=>a+v,0) / res.length;
      if(avg > bestAvg.val) bestAvg = {nick, val:avg};
    }
  });

  const statBox = (label, nick, display, cls='accent', clickable=true) => `
    <div class="lb-stat-box" ${clickable && nick!=='—' ? `onclick="goToPlayer('${nick.replace(/'/g,"\\'")}')"`  : ''}>
      <div class="lb-stat-label">${label}</div>
      <div class="lb-stat-player">${nick}</div>
      <div class="lb-stat-value ${cls}">${display}</div>
    </div>`;

  const funEl = document.getElementById('lbFunStats');
  if(!funEl) return;
  if(Object.keys(playerResults).length === 0) { funEl.innerHTML = ''; return; }

  funEl.innerHTML = [
    statBox('Lengste vinnerrekke', winStreak.nick,   `${winStreak.val} på rad`,   'pos'),
    statBox('Lengste taperekke',   loseStreak.nick,  `${loseStreak.val} på rad`,  'neg'),
    statBox('Beste enkeltsesson',  bestSingle.nick,  `+${fmt(bestSingle.val)}`,   'pos'),
    statBox('Verste enkeltsesson', worstSingle.nick, `${fmt(worstSingle.val)}`,   'neg'),
    statBox('Flest sessions',      mostPlayed.nick,  `${mostPlayed.val} spilt`,   'accent'),
    statBox('Beste win rate',      bestWinRate.nick, bestWinRate.val>=0 ? `${Math.round(bestWinRate.val*100)}%` : '—', 'accent'),
    statBox('Beste snitt/session', bestAvg.nick,     bestAvg.val>-Infinity ? `${bestAvg.val>=0?'+':''}${fmt(bestAvg.val)}` : '—', bestAvg.val>=0?'pos':'neg'),
  ].join('');
}

function goToPlayer(nick) {
  switchTab(1);
  selectPlayer(nick);
}

// ============================================================
// PAGE 4 - SESSIONS
// ============================================================
let sessionsPeriod = 'all';

function setSessionsPeriod(period, btn) {
  sessionsPeriod = period;
  document.querySelectorAll('#sessionsFilter .period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSessionsPage();
}

function renderSessionsPage() {
  const c = document.getElementById('sessionsAccordion');
  if(!c) return;
  const filtered = filterByPeriod(db.sessions, sessionsPeriod);
  const sorted = [...filtered].sort((a,b)=>b.date.localeCompare(a.date));

  if(sorted.length === 0) {
    c.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>Ingen sessions i denne perioden</p></div>';
    return;
  }

  c.innerHTML = sorted.map(s => {
    const sortedWinners = [...s.winners].sort((a,b)=>b.amount-a.amount);
    const sortedLosers = [...s.losers].sort((a,b)=>b.amount-a.amount);
    return `
      <div class="acc-item" id="acc-${s.id}">
        <div class="acc-header" onclick="toggleAcc(${s.id})">
          <span class="acc-chevron">▶</span>
          <span class="acc-date">${formatDate(s.date)}</span>
          <span style="flex:1;font-size:12px;color:var(--text3);font-family:var(--font-mono)">${sortedWinners.length + sortedLosers.length} spillere</span>
          <button class="delete-session" onclick="event.stopPropagation();deleteSession(${s.id})" title="Slett">🗑</button>
        </div>
        <div class="acc-body">
          <div class="acc-columns">
            <div>
              <div class="acc-col-title win">VINNERE</div>
              ${sortedWinners.length === 0
                ? '<div style="color:var(--text3);font-size:12px;">Ingen</div>'
                : sortedWinners.map(w=>`
                  <div class="acc-player-row">
                    <span class="acc-player-nick">${w.nick}</span>
                    <span class="acc-player-amount pos">+${fmt(w.amount)}</span>
                  </div>`).join('')}
            </div>
            <div>
              <div class="acc-col-title lose">TAPERE</div>
              ${sortedLosers.length === 0
                ? '<div style="color:var(--text3);font-size:12px;">Ingen</div>'
                : sortedLosers.map(l=>`
                  <div class="acc-player-row">
                    <span class="acc-player-nick">${l.nick}</span>
                    <span class="acc-player-amount neg">-${fmt(l.amount)}</span>
                  </div>`).join('')}
            </div>
          </div>
          <div class="acc-footer">
            <button class="btn-sm btn-edit" onclick="startEdit(${s.id})">Rediger</button>
            <button class="btn-sm btn-cancel" onclick="deleteSession(${s.id})">Slett</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleAcc(id) {
  const el = document.getElementById('acc-' + id);
  if(el) el.classList.toggle('open');
}

// ============================================================
// RENAME PLAYER
// ============================================================
function showRenameInput() {
  const bar = document.getElementById('playerNameBar');
  if(!bar) return;
  bar.innerHTML = `
    <input type="text" id="renameInput" value="${selectedPlayer}"
      style="background:var(--surface2);border:1px solid var(--accent2);border-radius:6px;color:var(--text);
             padding:7px 12px;font-family:var(--font-display);font-size:22px;letter-spacing:2px;outline:none;min-width:180px;"
      onkeydown="if(event.key==='Enter')submitRename();if(event.key==='Escape')renderPlayerView();">
    <button class="btn-sm btn-save" onclick="submitRename()">Lagre</button>
    <button class="btn-sm btn-cancel" onclick="renderPlayerView()">Avbryt</button>
  `;
  const inp = document.getElementById('renameInput');
  if(inp){ inp.focus(); inp.select(); }
}

async function submitRename() {
  const inp = document.getElementById('renameInput');
  const newNick = inp ? inp.value.trim() : '';
  if(!newNick || newNick === selectedPlayer) { renderPlayerView(); return; }

  const oldNick = selectedPlayer;
  const toUpdate = db.sessions.filter(s =>
    s.winners.some(w => w.nick === oldNick) || s.losers.some(l => l.nick === oldNick)
  );

  try {
    for(const session of toUpdate) {
      const updated = {
        ...session,
        winners: session.winners.map(w => w.nick === oldNick ? {...w, nick: newNick} : w),
        losers:  session.losers.map(l  => l.nick  === oldNick ? {...l,  nick: newNick} : l),
      };
      const res = await fetch('/api/sessions/' + session.id, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(updated),
      });
      if(!res.ok) throw new Error();
      db.sessions[db.sessions.findIndex(s => s.id === session.id)] = updated;
    }
    selectedPlayer = newNick;
    document.getElementById('playerSearch').value = newNick;
    updateDatalist();
    const dd = document.getElementById('playerDropdown');
    if(dd) dd.value = newNick;
    renderPlayerView();
    showToast(`${oldNick} → ${newNick}`, 'success');
  } catch(e) {
    showToast('Feil ved omdøping', 'error');
  }
}

function tabComplete(e, input) {
  if(e.key !== 'Tab') return;
  const q = input.value.trim().toLowerCase();
  if(!q) return;
  const match = getAllPlayers().find(p => p.toLowerCase().startsWith(q));
  if(match) input.value = match;
  // Don't preventDefault — Tab still moves focus to the amount field
}

// ============================================================
// SESSION EDIT
// ============================================================
let editStates = {};

function startEdit(id) {
  const session = db.sessions.find(s => s.id === id);
  if(!session) return;
  editStates[id] = {
    date: session.date,
    winners: session.winners.map(w => ({...w})),
    losers: session.losers.map(l => ({...l}))
  };
  renderEditBody(id);
}

function syncEditInputs(id) {
  const state = editStates[id];
  state.winners.forEach((w, i) => {
    const inp = document.getElementById(`ewi-${id}-${i}`);
    if(inp) w.amount = parseFloat(inp.value) || 0;
  });
  state.losers.forEach((l, i) => {
    const inp = document.getElementById(`eli-${id}-${i}`);
    if(inp) l.amount = parseFloat(inp.value) || 0;
  });
}

function renderEditBody(id) {
  const body = document.querySelector(`#acc-${id} .acc-body`);
  if(!body) return;
  const state = editStates[id];

  const winnerRows = state.winners.map((w, i) => `
    <div class="acc-edit-row">
      <span class="acc-player-nick">${w.nick}</span>
      <input class="acc-edit-input" type="number" id="ewi-${id}-${i}" value="${w.amount}" step="any">
      <button class="acc-swap-btn" onclick="swapToLoser(${id},${i})" title="Flytt til tapere">↓</button>
    </div>`).join('') || '<div style="color:var(--text3);font-size:12px;">Ingen</div>';

  const loserRows = state.losers.map((l, i) => `
    <div class="acc-edit-row">
      <span class="acc-player-nick">${l.nick}</span>
      <input class="acc-edit-input" type="number" id="eli-${id}-${i}" value="${l.amount}" step="any">
      <button class="acc-swap-btn" onclick="swapToWinner(${id},${i})" title="Flytt til vinnere">↑</button>
    </div>`).join('') || '<div style="color:var(--text3);font-size:12px;">Ingen</div>';

  body.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);">
      <span style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);">Dato</span>
      <input type="date" id="edit-date-${id}" value="${state.date}" style="background:var(--surface3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 10px;font-family:var(--font-mono);font-size:13px;outline:none;cursor:pointer;">
    </div>
    <div class="acc-columns">
      <div>
        <div class="acc-col-title win">VINNERE</div>
        ${winnerRows}
        <div class="acc-edit-row" style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);border-bottom:none;">
          <input class="acc-edit-input" type="text" id="new-w-nick-${id}" placeholder="Nick" list="playerList" style="flex:1;width:auto;">
          <input class="acc-edit-input" type="number" id="new-w-amt-${id}" placeholder="Beløp" step="any">
          <button class="acc-swap-btn" onclick="addNewPlayer(${id},'winner')" title="Legg til" style="font-size:16px;">+</button>
        </div>
      </div>
      <div>
        <div class="acc-col-title lose">TAPERE</div>
        ${loserRows}
        <div class="acc-edit-row" style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);border-bottom:none;">
          <input class="acc-edit-input" type="text" id="new-l-nick-${id}" placeholder="Nick" list="playerList" style="flex:1;width:auto;">
          <input class="acc-edit-input" type="number" id="new-l-amt-${id}" placeholder="Beløp" step="any">
          <button class="acc-swap-btn" onclick="addNewPlayer(${id},'loser')" title="Legg til" style="font-size:16px;">+</button>
        </div>
      </div>
    </div>
    <div class="acc-footer">
      <button class="btn-sm btn-cancel" onclick="cancelEdit(${id})">Avbryt</button>
      <button class="btn-sm btn-save" onclick="saveEdit(${id})">Lagre</button>
    </div>`;
}

function addNewPlayer(id, type) {
  const nickEl = document.getElementById(`new-${type[0]}-nick-${id}`);
  const amtEl  = document.getElementById(`new-${type[0]}-amt-${id}`);
  const nick   = nickEl ? nickEl.value.trim() : '';
  const amount = amtEl  ? parseFloat(amtEl.value) : NaN;
  if(!nick || isNaN(amount) || amount === 0) { showToast('Fyll inn nick og beløp', 'error'); return; }
  syncEditInputs(id);
  if(type === 'winner') editStates[id].winners.push({nick, amount});
  else                  editStates[id].losers.push({nick, amount});
  renderEditBody(id);
}

function swapToLoser(id, idx) {
  syncEditInputs(id);
  const state = editStates[id];
  state.losers.push(state.winners.splice(idx, 1)[0]);
  renderEditBody(id);
}

function swapToWinner(id, idx) {
  syncEditInputs(id);
  const state = editStates[id];
  state.winners.push(state.losers.splice(idx, 1)[0]);
  renderEditBody(id);
}

function cancelEdit(id) {
  delete editStates[id];
  renderSessionsPage();
}

async function saveEdit(id) {
  syncEditInputs(id);
  const state = editStates[id];
  const session = db.sessions.find(s => s.id === id);
  if(!session) return;
  const dateEl = document.getElementById(`edit-date-${id}`);
  const date = dateEl ? dateEl.value : session.date;
  const updated = { ...session, date, winners: state.winners, losers: state.losers };
  try {
    const res = await fetch('/api/sessions/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updated)
    });
    if(!res.ok) throw new Error();
    const idx = db.sessions.findIndex(s => s.id === id);
    db.sessions[idx] = updated;
    db.sessions.sort((a, b) => a.date.localeCompare(b.date));
    delete editStates[id];
    renderSessionsPage();
    showToast('Session oppdatert', 'success');
  } catch(e) {
    showToast('Feil ved lagring', 'error');
  }
}

// ============================================================
// UTILS
// ============================================================
function fmt(n) {
  if(isNaN(n)) return '—';
  return new Intl.NumberFormat('nb-NO', {maximumFractionDigits:0}).format(n * 1000);
}
function formatDate(dateStr) {
  if(!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('nb-NO', {day:'2-digit',month:'short',year:'numeric'});
}
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  await loadDB();
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('sessionDate').value = today;
  initRows();
  initBuyinFields();
  updateDatalist();
});
</script>
